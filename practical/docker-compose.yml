version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "echo 'exit' | sqlplus -L sys/${ORACLE_PASSWORD}@localhost:1521/FREE as sysdba || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: .
    container_name: backend-1
    ports:
      - "8080:8080"
    environment:
      - DB_PASSWORD=${ORACLE_PASSWORD}
    depends_on:
      oracle-db:
        condition: service_healthy
